<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fantasy NBA — v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="shell.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: var(--fs-md); line-height: var(--lh-base); font-feature-settings: var(--feat-text); -webkit-font-smoothing: antialiased; }
  button, input { font-family: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  h1, h2, h3, h4 { font-family: var(--display); font-weight: 600; letter-spacing: -0.01em; }
  [hidden] { display: none !important; }
  .mono { font-family: var(--mono); font-feature-settings: var(--feat-num); }
  .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-3); font-weight: 600; font-family: var(--mono); }
  .skel { background: linear-gradient(90deg, var(--card, #1c1c1c) 0%, var(--line, #2a2a2a) 50%, var(--card, #1c1c1c) 100%); background-size: 200% 100%; animation: skel 1.2s infinite; border-radius: 8px; }
  @keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skel-row { height: 14px; margin: 8px 0; }
  .err-panel { padding: 20px; border: 1px solid var(--bad, #f87171); border-radius: 10px; background: rgba(248,113,113,0.06); color: var(--ink); margin: 16px 0; }
  .err-panel h3 { color: var(--bad, #f87171); margin-bottom: 8px; font-size: var(--fs-md); }
  .err-panel pre { font-family: var(--mono); font-size: 11px; color: var(--ink-3); margin: 8px 0 12px; white-space: pre-wrap; word-break: break-all; }
  .empty-state { padding: 32px 20px; text-align: center; color: var(--ink-3); font-size: var(--fs-sm); }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- ===================== HEADER ===================== -->
  <header class="shell-header">
    <div class="brand">
      <div class="brand-mark">NF</div>
      <div class="brand-name">Fantasy NBA <span class="sub">/ v2</span></div>
    </div>
    <button class="league-switch" title="切換聯盟">
      <span class="phase-dot"></span>
      <span>絕地爆米花盃 · 12人</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="cmd-trigger" id="cmd-open">
      <svg class="ct-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <span class="ct-text">搜尋球員、指令…</span>
      <span class="kbd">⌘K</span>
    </button>
    <div class="header-actions">
      <button class="icon-btn" data-badge="3" title="通知">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>
      </button>
      <button class="icon-btn" title="設定">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="me-chip" id="me-chip">
        <div class="av sm" data-grad="1">ME</div>
        <span class="me-chip-name">—</span>
      </button>
    </div>
  </header>

  <!-- ===================== NAV ===================== -->
  <nav class="shell-nav" id="nav"></nav>

  <!-- ===================== MAIN ===================== -->
  <main class="shell-main" id="main"></main>

  <!-- ===================== RIGHT RAIL ===================== -->
  <aside class="shell-rail" id="rail"></aside>

  <!-- ===================== MOBILE TABBAR ===================== -->
  <div class="shell-tabbar" id="tabbar"></div>
</div>

<!-- ===================== CMDK MODAL ===================== -->
<div class="cmdk-backdrop" id="cmdk-bd">
  <div class="cmdk" role="dialog" aria-label="指令面板">
    <div class="cmdk-input">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input type="text" id="cmdk-q" placeholder="跳到頁面、搜尋球員、下指令…" autocomplete="off"/>
      <span class="kbd">ESC</span>
    </div>
    <div class="cmdk-list" id="cmdk-list"></div>
  </div>
</div>

<!-- ===================== TOASTS ===================== -->
<div class="toast-stack" id="toasts"></div>

<!-- ===================== APP ===================== -->
<script>
/* Fantasy NBA v2 — app.js (API-driven)
 * Hash router, nav, views. All views are async and call FastAPI.
 */
(() => {
  const $  = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];
  const h = (tag, attrs={}, ...kids) => {
    const el = document.createElement(tag);
    Object.entries(attrs).forEach(([k,v]) => {
      if (k === 'class') el.className = v;
      else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2), v);
      else if (v === true) el.setAttribute(k, '');
      else if (v !== false && v != null) el.setAttribute(k, v);
    });
    kids.flat().forEach(k => el.append(k instanceof Node ? k : document.createTextNode(k)));
    return el;
  };
  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

  // ========================================================
  // CACHE + LOADERS
  // ========================================================
  const cache = new Map();
  async function get(url, ttl=10000){
    const now = Date.now();
    const c = cache.get(url);
    if (c && (now - c.t) < ttl) return c.v;
    const r = await fetch(url);
    if (!r.ok) {
      let body = '';
      try { body = await r.text(); } catch(_){}
      const err = new Error(url + ' ' + r.status);
      err.status = r.status; err.body = body;
      throw err;
    }
    const v = await r.json();
    cache.set(url, {t: now, v});
    return v;
  }
  function invalidate(prefix){
    for (const k of [...cache.keys()]) if (k.startsWith(prefix)) cache.delete(k);
  }

  const loaders = {
    me:            () => get('/api/me'),
    league:        () => get('/api/league/settings'),
    leagueStatus:  () => get('/api/league/status'),
    homeBrief:     () => get('/api/home/brief'),
    homeActions:   () => get('/api/home/actions'),
    standings:     () => get('/api/season/standings'),
    schedule:      () => get('/api/season/schedule'),
    matchup:       (w) => get('/api/season/matchup?week=' + w),
    matchupDetail: (w, a, b) => get('/api/season/matchup-detail?week=' + w + '&team_a=' + a + '&team_b=' + b),
    team:          (id) => get('/api/teams/' + id),
    players:       () => get('/api/players?limit=500'),
    draftState:    () => get('/api/state'),
    draftRecos:    () => get('/api/draft/recommendations?limit=6'),
    tradesPending: () => get('/api/trades/pending'),
    tradesHistory: () => get('/api/trades/history'),
    faStatus:      () => get('/api/fa/claim-status'),
    news:          () => get('/api/news/feed?limit=30'),
    categoryOdds:  (tradeId) => get('/api/trades/' + encodeURIComponent(tradeId) + '/category-odds'),
  };

  // Tolerant fetchers — swallow 404/409/4xx that mean "season not started"
  async function tryGet(loaderFn, fallback) {
    try { return await loaderFn(); }
    catch(e){ return fallback; }
  }

  // ---------- SVG icon helpers ----------
  const ic = (paths, s=16) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
  const I = {
    home:    ic('<path d="m3 11 9-7 9 7v9a2 2 0 0 1-2 2h-4v-7h-6v7H5a2 2 0 0 1-2-2z"/>'),
    roster:  ic('<circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="17" cy="7" r="3"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/>'),
    match:   ic('<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>'),
    trade:   ic('<path d="M7 7h14l-3-3"/><path d="M17 17H3l3 3"/><path d="M17 17V7"/><path d="M7 7v10"/>'),
    league:  ic('<path d="M4 20h16"/><path d="M6 16h3v4H6z"/><path d="M10.5 12h3v8h-3z"/><path d="M15 8h3v12h-3z"/>'),
    fa:      ic('<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/><path d="M11 8v6"/><path d="M8 11h6"/>'),
    draft:   ic('<path d="m9 11 3 3 8-8"/><path d="M20 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h11"/>'),
    history: ic('<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'),
    schedule:ic('<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>'),
    chat:    ic('<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'),
    settings:ic('<circle cx="12" cy="12" r="3"/><path d="M12 1v6M12 17v6M4.2 4.2l4.2 4.2M15.6 15.6l4.2 4.2M1 12h6M17 12h6M4.2 19.8l4.2-4.2M15.6 8.4l4.2-4.2"/>'),
    plus:    ic('<path d="M12 5v14M5 12h14"/>'),
    arrow:   ic('<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>'),
    alert:   ic('<path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>'),
    check:   ic('<path d="M20 6 9 17l-5-5"/>'),
    syringe: ic('<path d="m18 2 4 4"/><path d="m17 7 3-3"/><path d="M19 9 8.7 19.3a1 1 0 0 1-1.4 0l-2.6-2.6a1 1 0 0 1 0-1.4L15 5"/><path d="m9 11 4 4"/>'),
    waiver:  ic('<path d="M12 2v20"/><path d="m5 9 7-7 7 7"/><path d="m5 15 7 7 7-7"/>'),
    sparkle: ic('<path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M5.6 18.4l2.8-2.8M15.6 8.4l2.8-2.8"/>'),
    send:    ic('<path d="m22 2-7 20-4-9-9-4 20-7z"/>'),
  };

  // ========================================================
  // AVATAR / FORM HELPERS
  // ========================================================
  const initials = (name) => {
    if (!name) return '—';
    const parts = String(name).trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return '—';
    if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
    return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  };
  const gradFor = (key) => {
    // Hash any id/name into 1..8 for the gradient variants.
    if (typeof key === 'number' && Number.isFinite(key)) return ((Math.abs(key) % 8) + 1);
    const s = String(key || '');
    let hash = 0;
    for (let i=0;i<s.length;i++) hash = (hash * 31 + s.charCodeAt(i)) | 0;
    return ((Math.abs(hash) % 8) + 1);
  };
  const av = (name, grad, sizeCls='') =>
    `<div class="av ${sizeCls}" data-grad="${grad}">${esc(initials(name))}</div>`;

  // Convert a form array (entries in {-1,0,1} or a proxy) into spark blocks.
  // Server returns form[5] already in this shape via /api/teams/{id}.
  const formBlocks = (form) => {
    const f = Array.isArray(form) ? form.slice(-5) : [];
    while (f.length < 5) f.unshift(0);
    return f.map(v => `<div class="spark ${v===1?'hot':v===-1?'cold':'warm'}"></div>`).join('');
  };

  // Status chip color class for a player status like 'healthy'|'questionable'|'out'|'day-to-day'|'hot'|...
  const statusClass = (s) => {
    if (!s) return '';
    const x = String(s).toLowerCase();
    if (x === 'out' || x === 'injured') return 'bad';
    if (x === 'questionable' || x === 'day-to-day' || x === 'dtd' || x === 'warm') return '';
    if (x === 'hot' || x === 'healthy') return 'good';
    return '';
  };

  // Approximate a narrative snippet from form[5] (no raw FPPG shown).
  const narrativeFromForm = (form) => {
    const f = Array.isArray(form) ? form.filter(v => typeof v === 'number') : [];
    if (!f.length) return '資料不足';
    const hot = f.filter(v => v === 1).length;
    const cold = f.filter(v => v === -1).length;
    if (hot >= 4) return '近況火熱';
    if (hot >= 3) return '手感穩定';
    if (cold >= 3) return '狀態低迷';
    if (cold >= 2) return '手感冷卻';
    return '平均表現';
  };

  // ========================================================
  // SKELETONS + ERROR CARDS
  // ========================================================
  function skeleton(route){
    const rows = (n=4) => Array.from({length:n}).map(() => `<div class="skel skel-row" style="width:${60+Math.random()*40}%"></div>`).join('');
    const block = (h=120) => `<div class="skel" style="height:${h}px;margin:8px 0"></div>`;
    if (route === 'home')      return `<div class="view-head"><div class="view-title-block">${rows(1)}${rows(2)}</div></div>${block(180)}${block(140)}${block(220)}`;
    if (route === 'matchup')   return `<div class="view-head"><div class="view-title-block">${rows(2)}</div></div>${block(220)}${block(280)}`;
    if (route === 'roster')    return `<div class="view-head"><div class="view-title-block">${rows(2)}</div></div>${block(340)}`;
    if (route === 'draft')     return `<div class="view-head"><div class="view-title-block">${rows(2)}</div></div>${block(160)}${block(240)}`;
    if (route === 'trade')     return `<div class="view-head"><div class="view-title-block">${rows(2)}</div></div>${block(460)}`;
    if (route === 'fa')        return `<div class="view-head"><div class="view-title-block">${rows(2)}</div></div>${block(380)}`;
    if (route === 'schedule')  return `<div class="view-head"><div class="view-title-block">${rows(1)}</div></div>${block(220)}`;
    if (route === 'standings') return `<div class="view-head"><div class="view-title-block">${rows(1)}</div></div>${block(420)}`;
    if (route === 'news')      return `<div class="view-head"><div class="view-title-block">${rows(1)}</div></div>${block(420)}`;
    return `<div class="view-head"><div class="view-title-block">${rows(2)}</div></div>${block(240)}`;
  }
  function errorCard(err){
    const msg = err && err.message ? err.message : String(err || '未知錯誤');
    const body = err && err.body ? err.body : '';
    return `<div class="err-panel">
      <h3>載入失敗</h3>
      <div>無法取得後端資料。API 可能未就緒或賽季尚未開始。</div>
      <pre>${esc(msg)}${body ? '\n\n' + esc(body).slice(0,400) : ''}</pre>
      <button class="btn sm" id="err-retry">重試</button>
    </div>`;
  }
  function emptyCard(text){
    return `<div class="card card-pad empty-state">${esc(text)}</div>`;
  }

  // ========================================================
  // NAV + TABBAR (async)
  // ========================================================
  async function renderNav() {
    const route = currentRoute();
    const [league, status, pending, me] = await Promise.all([
      tryGet(loaders.league, {league_name:'聯盟', num_teams:8, regular_season_weeks:21}),
      tryGet(loaders.leagueStatus, {setup_complete:false, regular_season_weeks:21}),
      tryGet(loaders.tradesPending, {pending:[]}),
      tryGet(loaders.me, {name:'', team_id:0, current_week:0}),
    ]);

    const draftDone = !!(status && status.setup_complete);
    const unread = Array.isArray(pending.pending) ? pending.pending.filter(t => t.to_team === me.team_id && t.status === 'pending_accept').length : 0;

    // Header league-switch name
    const leagueSwitch = $('.league-switch span:nth-child(2)');
    if (leagueSwitch) leagueSwitch.textContent = `${league.league_name || '聯盟'} · ${league.num_teams || 8}人`;
    // Me chip
    const meChip = $('#me-chip');
    if (meChip && me && me.name) {
      meChip.querySelector('.av').textContent = initials(me.name);
      meChip.querySelector('.av').setAttribute('data-grad', gradFor(me.team_id));
      meChip.querySelector('.me-chip-name').textContent = me.name;
    }

    const items = [
      { group:'主要' },
      { id:'home',     label:'今日',     icon:I.home, shortcut:'G H' },
      { id:'matchup',  label:'對戰',     icon:I.match, shortcut:'G M' },
      { id:'roster',   label:'球隊',     icon:I.roster, shortcut:'G R' },
      { group:'賽事' },
      { id:'draft',    label:'選秀廳',   icon:I.draft, dot:!draftDone, demoted:draftDone },
      { id:'trade',    label:'交易',     icon:I.trade, badge: unread || null },
      { id:'fa',       label:'自由球員', icon:I.fa },
      { id:'schedule', label:'排程',     icon:I.schedule },
      { group:'聯盟' },
      { id:'standings',label:'排名',     icon:I.league },
      { id:'news',     label:'動態',     icon:I.chat },
    ];

    const nav = $('#nav');
    nav.innerHTML = '';
    items.forEach(it => {
      if (it.group) { nav.append(h('div', {class:'nav-group-label'}, it.group)); return; }
      const a = h('a', {
        class: 'nav-item' + (it.demoted ? ' demoted' : ''),
        href: '#/' + it.id,
        'data-phase': it.id === 'draft' && it.dot ? 'draft' : '',
        'aria-current': route === it.id ? 'page' : null,
      });
      a.innerHTML = `<span class="ni-ic">${it.icon}</span><span>${it.label}</span>`;
      if (it.badge) a.innerHTML += `<span class="ni-badge">${it.badge}</span>`;
      else if (it.dot) a.innerHTML += `<span class="ni-dot"></span>`;
      else if (it.shortcut) a.innerHTML += `<span class="ni-shortcut">${it.shortcut}</span>`;
      nav.append(a);
    });

    const totalWeeks = league.regular_season_weeks || status.regular_season_weeks || 21;
    const week = me.current_week || 0;
    const pct = totalWeeks > 0 ? Math.round(Math.min(100, (week / totalWeeks) * 100)) : 0;
    const season = h('div', {class:'nav-season'});
    season.innerHTML = `
      <div class="nav-season-label">本季進度</div>
      <div class="nav-season-name">${esc(league.season_year || '2025-26')} · ${draftDone ? '例行賽' : '選秀階段'}</div>
      <div class="nav-season-track"><div class="nav-season-fill" style="width:${pct}%"></div></div>
      <div class="nav-season-meta"><span>W${week} / ${totalWeeks}</span><span>${pct}%</span></div>`;
    nav.append(season);

    // Mobile tabbar
    const tabbar = $('#tabbar');
    const tabs = ['home','matchup','roster','trade','standings'];
    const labels = {home:'今日',matchup:'對戰',roster:'球隊',trade:'交易',standings:'排名'};
    const tabIcon = {home:I.home, matchup:I.match, roster:I.roster, trade:I.trade, standings:I.league};
    tabbar.innerHTML = '';
    tabs.forEach(t => {
      const btn = h('a', {class:'tab-btn', href:'#/'+t, 'aria-current': route===t?'page':null});
      btn.innerHTML = `${tabIcon[t] || I.home}<span>${labels[t]}</span>`;
      tabbar.append(btn);
    });
  }

  // ========================================================
  // RIGHT RAIL (async, route-dependent)
  // ========================================================
  async function renderRail() {
    const route = currentRoute();
    const rail = $('#rail');
    try {
      if (['home','standings','schedule','news'].includes(route)) { rail.innerHTML = await renderNewsFeed(); return; }
      if (route === 'roster' || route === 'matchup')              { rail.innerHTML = await renderMatchupMini(); return; }
      if (route === 'trade')                                      { rail.innerHTML = await renderTradeSidebar(); return; }
      if (route === 'draft')                                      { rail.innerHTML = await renderDraftBoard(); return; }
      if (route === 'fa')                                         { rail.innerHTML = await renderWaiverBudget(); return; }
      rail.innerHTML = await renderNewsFeed();
    } catch(e) {
      rail.innerHTML = `<div class="rail-section"><div class="rail-head"><span>側欄</span></div>${errorCard(e)}</div>`;
    }
  }

  async function renderNewsFeed() {
    const data = await tryGet(loaders.news, {feed:[]});
    const feed = Array.isArray(data.feed) ? data.feed : (Array.isArray(data) ? data : []);
    const kindIcon = { injury:'🩹', heat:'🔥', league:'📎', quote:'"', milestone:'★', matchup:'⚔' };
    const items = feed.length === 0
      ? `<div class="empty-state">尚無動態</div>`

  async function renderTradeSidebar() {
    const pending = await tryGet(loaders.tradesPending, {pending:[]});
    const list = Array.isArray(pending.pending) ? pending.pending : [];
    const active = list.find(t => t.id === activeThread) || list[0];

    let odds = null;
    if (active) {
      odds = await tryGet(() => loaders.categoryOdds(active.id), null);
    }

    const bars = odds && odds.categories ? Object.entries(odds.categories).map(([cat, d]) => {
      const total = Math.max(0.001, Math.abs(d.send) + Math.abs(d.receive));
      const mine = Math.abs(d.send) / total;
      const theirs = Math.abs(d.receive) / total;
      const CAT_LABEL = {pts:'得分', reb:'籃板', ast:'助攻', stl:'抄截', blk:'阻攻', to:'失誤'};
      return `<div class="tl-bar">
        <div class="l">${d.send.toFixed(1)}</div>
        <div class="tl-bar-track">
          <div class="tl-bar-mine" style="width:${mine*100}%"></div>
          <div class="tl-bar-theirs" style="width:${theirs*100}%"></div>
        </div>
        <div class="r">${d.receive.toFixed(1)}</div>
      </div>
      <div style="font-size:10px;color:var(--ink-3);margin:-4px 0 8px;text-align:center;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em">${esc(CAT_LABEL[cat] || cat)}</div>`;
    }).join('') : '';

    const verdict = odds ? `<div class="tl-verdict">
        <div class="tl-verdict-head">AI 判決 · <b>${odds.fp_delta_per_game > 0 ? '建議接受' : odds.fp_delta_per_game < 0 ? '建議拒絕' : '中性'}</b></div>
        <div>預估每場得分差距 ${odds.fp_delta_per_game > 0 ? '+' : ''}${odds.fp_delta_per_game.toFixed(2)}。</div>
      </div>` : '<div class="tl-verdict"><div class="tl-verdict-head">尚無交易分析</div><div>請選擇交易提案以查看五類別影響。</div></div>';

    return `<div class="rail-section">
      <div class="rail-head"><span>AI 交易分析</span>${active ? `<span class="pill accent" style="margin-left:auto">#${esc(active.id.slice(-4))}</span>`:''}</div>
      ${verdict}
    </div>
    <div class="rail-section">
      <div class="rail-head"><span>類別影響</span></div>
      <div class="card card-pad">
        ${bars || '<div class="empty-state">尚無交易資料</div>'}
      </div>
    </div>`;
  }

  views.matchup = async () => {
    const me = await loaders.me();
    const wk = me.current_week || 0;
    if (!wk) {
      return `<div class="view-head"><div class="view-title-block"><span class="eyebrow">對戰</span><div class="view-title">本週對戰</div></div></div>${emptyCard('賽季尚未開始')}`;
    }
    const matchData = await tryGet(() => loaders.matchup(wk), {matchups:[]});
    const mine = (matchData.matchups || []).find(m => m.team_a === me.team_id || m.team_b === me.team_id);
    if (!mine) {
      return `<div class="view-head"><div class="view-title-block"><span class="eyebrow">第 ${wk} 週</span><div class="view-title">本週對戰</div></div></div>${emptyCard('找不到你的本週對戰')}`;
    }
    const isA = mine.team_a === me.team_id;
    const myScore = isA ? mine.score_a : mine.score_b;
    const oppScore = isA ? mine.score_b : mine.score_a;
    const oppId = isA ? mine.team_b : mine.team_a;

    // Detailed logs (last ~3 weeks only, may 404 for older)
    const detail = await tryGet(() => loaders.matchupDetail(wk, mine.team_a, mine.team_b), null);
    const myPlayers  = detail ? (isA ? detail.players_a : detail.players_b) : [];
    const oppPlayers = detail ? (isA ? detail.players_b : detail.players_a) : [];
    const myTeamName = detail ? (isA ? detail.team_a_name : detail.team_b_name) : me.name;
    const oppTeamName = detail ? (isA ? detail.team_b_name : detail.team_a_name) : ('T' + oppId);

    const sum = (myScore + oppScore) || 1;
    const myPct = (myScore / sum) * 100;

    // Aggregate by player (sum fp across days shown)
    const aggregate = (rows) => {
      const map = new Map();
      for (const r of (rows || [])) {
        const key = r.player_id;
        if (!map.has(key)) map.set(key, {player_id:key, name:r.player_name, pos:r.pos, fp:0, games:0});
        const agg = map.get(key);
        agg.fp += (r.fp || 0);
        if (r.played) agg.games += 1;
      }
      return [...map.values()].sort((a,b) => b.fp - a.fp);
    };
    const myAgg  = aggregate(myPlayers);
    const oppAgg = aggregate(oppPlayers);

    const renderRow = (p) => `
      <div style="display:grid;grid-template-columns:40px 40px 1fr auto;gap:14px;align-items:center;padding:12px 20px;border-bottom:1px solid var(--line-soft)">
        <span class="pos-tag" data-pos="${esc(p.pos || '')}">${esc(p.pos || '')}</span>
        ${av(p.name, gradFor(p.player_id))}
        <div>
          <div style="font-weight:500;font-size:var(--fs-sm)">${esc(p.name)}</div>
          <div style="font-size:11px;color:var(--ink-3);font-family:var(--mono);margin-top:2px">出賽 ${p.games}</div>
        </div>
        <div class="mono" style="font-weight:700;min-width:48px;text-align:right;color:var(--ink)">${p.fp.toFixed(1)}</div>
      </div>`;

    return `
      <div class="view-head">
        <div class="view-title-block">
          <span class="eyebrow">第 ${wk} 週 · ${mine.complete ? '已結算' : '例行賽'}</span>
          <div class="view-title">${esc(myTeamName)} vs ${esc(oppTeamName)}</div>
          <div class="view-sub">${mine.complete ? `最終 ${myScore} - ${oppScore}` : '進行中'}</div>
        </div>
      </div>

      <div class="card" style="margin-bottom:var(--s-5)">
        <div class="matchup-body" style="padding:var(--s-7) var(--s-8)">
          <div class="matchup-side you ${myScore>=oppScore?'winning':'losing'}">
            <div class="matchup-team">${av(me.name, gradFor(me.team_id), 'lg')}<span style="font-size:var(--fs-lg);font-weight:600;margin-top:6px">${esc(myTeamName)}</span></div>
            <div class="matchup-score mono" style="color:var(--good);font-size:var(--fs-4xl)">${myScore.toFixed(1)}</div>
          </div>
          <div class="matchup-vs mono" style="font-size:var(--fs-xl)">VS</div>
          <div class="matchup-side them ${myScore>=oppScore?'losing':'winning'}">
            <div class="matchup-team">${av(oppTeamName, gradFor(oppId), 'lg')}<span style="font-size:var(--fs-lg);font-weight:600;margin-top:6px">${esc(oppTeamName)}</span></div>
            <div class="matchup-score mono" style="font-size:var(--fs-4xl)">${oppScore.toFixed(1)}</div>
          </div>
        </div>
        <div class="matchup-progress" style="padding:0 var(--s-8) var(--s-6)">
          <div class="matchup-progress-track"><div class="mpt-you" style="width:${myPct.toFixed(1)}%"></div><div class="mpt-them" style="width:${(100-myPct).toFixed(1)}%"></div></div>
          <div class="matchup-progress-meta">
            <span>${myPct.toFixed(0)}%</span>
            <span>差距 ${Math.abs(myScore - oppScore).toFixed(1)}</span>
            <span>${(100-myPct).toFixed(0)}%</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h3>${esc(myTeamName)} 本週貢獻</h3><span class="sub">${detail ? '依 FP 排序' : '舊週已壓縮'}</span></div>
        <div>${myAgg.length ? myAgg.map(renderRow).join('') : emptyCard('此週球員日誌已壓縮')}</div>
      </div>

      <div class="card" style="margin-top:var(--s-5)">
        <div class="card-header"><h3>${esc(oppTeamName)} 本週貢獻</h3><span class="sub">對手</span></div>
        <div>${oppAgg.length ? oppAgg.map(renderRow).join('') : emptyCard('此週球員日誌已壓縮')}</div>
      </div>
    `;
  };

  // ---------- ROSTER ----------
  views.roster = async () => {
    const me = await loaders.me();
    const team = await tryGet(() => loaders.team(me.team_id), null);

          <div class="view-title">${esc(team.team.name)} · 陣容</div>

        <div class="roster-grid">${starters.map(s => renderSlot(s.p, s.slot)).join('') || emptyCard('尚未設定先發')}</div>
      </div>

      <div style="margin-bottom:var(--s-6)">
        <div class="eyebrow" style="margin-bottom:var(--s-3)">板凳 · ${bench.length} 人</div>
        <div class="roster-grid">${bench.map(p => renderSlot(p, 'BN')).join('') || emptyCard('板凳為空')}</div>
      </div>

      <div>
        <div class="eyebrow" style="margin-bottom:var(--s-3)">傷兵名單 · ${ir.length} 人</div>
        <div class="roster-grid">${ir.map(p => renderSlot(p, 'IR')).join('') || emptyCard('無傷兵')}</div>

  // ---------- TRADE ----------
  let activeThread = null;
  views.trade = async () => {
    const [me, pendingData, historyData] = await Promise.all([
      loaders.me(),
      tryGet(loaders.tradesPending, {pending:[]}),
      tryGet(loaders.tradesHistory, {history:[]}),
    ]);
    const pending = pendingData.pending || [];
    const history = historyData.history || [];
    const threads = [...pending, ...history];
    if (activeThread == null && threads.length > 0) activeThread = threads[0].id;
    const thread = threads.find(t => t.id === activeThread) || threads[0] || null;

    const otherTeamOf = (t) => (t.from_team === me.team_id ? t.to_team : t.from_team);
    const threadList = threads.map(t => {
      const otherId = otherTeamOf(t);
      const isUnread = t.status === 'pending_accept' && t.to_team === me.team_id;
      const preview = (t.messages && t.messages.length > 0) ? (t.messages[t.messages.length-1].body || '') : (t.proposer_message || (t.status || ''));
      return `<div class="ts-row ${t.id===activeThread?'active':''}" data-thread="${esc(t.id)}">
        ${av('T'+otherId, gradFor(otherId))}
        <div>
          <div class="ts-name">隊伍 #${otherId}</div>
          <div class="ts-preview">${esc(preview.slice(0,60))}</div>
          <div class="ts-fit ${t.status==='executed'?'':'mid'}">${esc(t.status)}</div>
        </div>
        <div class="ts-time">${isUnread?'未讀':'已讀'}</div>
      </div>`;
    }).join('');

    if (!thread) {
      return `
        <div class="view-head">
          <div class="view-title-block">
            <span class="eyebrow">交易中心</span>
            <div class="view-title">尚無交易</div>
            <div class="view-sub">發起一筆交易以開始對話</div>
          </div>
          <div class="view-actions"><button class="btn">發起交易 ${I.plus}</button></div>
        </div>
        ${emptyCard('目前沒有任何交易紀錄')}
      `;
    }

    const otherId = otherTeamOf(thread);
    const mineIds = thread.from_team === me.team_id ? thread.send_player_ids : thread.receive_player_ids;
    const theirIds = thread.from_team === me.team_id ? thread.receive_player_ids : thread.send_player_ids;

    // Messages (TradeMessage list: from_team/body/ts/kind)
    const msgs = (thread.messages || []).map(m => {
      const mine = m.from_team === me.team_id;
      if (m.kind === 'system') {
        return `<div class="bubble-row them"><div class="bubble them" style="background:var(--line-soft);color:var(--ink-3);font-style:italic">${esc(m.body)}</div></div>`;
      }
      return `<div class="bubble-row ${mine?'me':'them'}">
        <div class="bubble ${mine?'me':'them'}">${esc(m.body)}</div>
        <div class="bubble-meta">${esc(m.kind || 'user')}</div>
      </div>`;
    }).join('');

    // Proposal panel
    const proposal = `<div class="proposal">
      <div class="proposal-head"><span>交易提案 <span class="proposal-id">#${esc(thread.id.slice(-6))}</span></span><span>隊伍 #${thread.from_team} 提出</span></div>
      <div class="prop-sides">
        <div class="prop-side">
          <div class="prop-side-head">他給你</div>
          <ul>${theirIds.map(pid => `<li><span class="pn">Player #${pid}</span></li>`).join('')}</ul>
        </div>
        <div class="prop-arrow">${I.arrow}</div>
        <div class="prop-side mine">
          <div class="prop-side-head">你給他</div>
          <ul>${mineIds.map(pid => `<li><span class="pn">Player #${pid}</span></li>`).join('')}</ul>
        </div>
      </div>
      ${thread.status === 'pending_accept' && thread.to_team === me.team_id
        ? `<div style="display:flex;gap:8px;justify-content:center;margin-top:6px"><button class="btn sm" data-trade-accept="${esc(thread.id)}">接受</button><button class="btn sm subtle" data-trade-reject="${esc(thread.id)}">拒絕</button></div>`
        : `<div style="text-align:center;color:var(--ink-3);font-size:var(--fs-xs);margin-top:6px">狀態：${esc(thread.status)}</div>`}
    </div>`;

    // Category odds (inline in main analysis panel)
    const odds = await tryGet(() => loaders.categoryOdds(thread.id), null);
    const CAT_LABEL = {pts:'得分', reb:'籃板', ast:'助攻', stl:'抄截', blk:'阻攻', to:'失誤'};
    const catBars = odds && odds.categories ? Object.entries(odds.categories).map(([cat, d]) => {
      const total = Math.max(0.001, Math.abs(d.send) + Math.abs(d.receive));
      const a = Math.abs(d.send) / total;
      const b = Math.abs(d.receive) / total;
      return `<div class="tl-bar"><div class="l">${d.send.toFixed(1)}</div><div class="tl-bar-track"><div class="tl-bar-mine" style="width:${a*100}%"></div><div class="tl-bar-theirs" style="width:${b*100}%"></div></div><div class="r">${d.receive.toFixed(1)}</div></div>
      <div style="font-size:10px;color:var(--ink-3);margin:-4px 0 8px;text-align:center;font-family:var(--mono);text-transform:uppercase">${esc(CAT_LABEL[cat] || cat)}</div>`;
    }).join('') : '';

    const unreadCount = pending.filter(t => t.to_team === me.team_id && t.status === 'pending_accept').length;
    return `
      <div class="view-head">
        <div class="view-title-block">
          <span class="eyebrow">交易中心</span>
          <div class="view-title">你與隊伍 #${otherId} 的對話</div>
          <div class="view-sub">${unreadCount} 則待處理 · 歷史 ${history.length} 筆</div>
        </div>
        <div class="view-actions"><button class="btn">發起交易 ${I.plus}</button></div>
      </div>

      <div class="trade-grid">
        <div class="trade-sidebar">
          <div class="ts-head"><h3>交易列表</h3></div>
          <div class="ts-list">${threadList || emptyCard('尚無交易')}</div>
        </div>

        <div class="trade-chat">
          <div class="tc-head">
            ${av('T'+otherId, gradFor(otherId))}
            <div>
              <div style="font-weight:600;font-size:var(--fs-sm)">隊伍 #${otherId}</div>
              <div style="font-size:11px;color:var(--ink-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.05em">狀態 · ${esc(thread.status)}</div>
            </div>
            <span class="pill accent" style="margin-left:auto">W${thread.proposed_week}</span>
          </div>
          <div class="tc-body" id="chat-body">
            ${proposal}
            ${msgs}
          </div>
          <div class="tc-composer">
            <input type="text" placeholder="輸入訊息…" id="chat-input" data-trade-id="${esc(thread.id)}"/>
            <button class="btn" id="chat-send">${I.send}</button>
          </div>
        </div>

        <div class="trade-ledger">
          <div class="tl-head"><h3>AI 交易分析</h3></div>
          <div class="tl-body">
            ${odds ? `<div class="tl-verdict"><div class="tl-verdict-head">FP 差 · <b>${odds.fp_delta_per_game>0?'+':''}${odds.fp_delta_per_game.toFixed(2)}</b></div><div>每場得分變化（從你角度）。</div></div>` : '<div class="tl-verdict"><div class="tl-verdict-head">無分析</div></div>'}
            <div class="tl-section">
              <h4>五類別影響</h4>
              ${catBars || '<div class="empty-state">無資料</div>'}
            </div>
          </div>
        </div>
      </div>
    `;
  };

  // ---------- FA ----------

          <tbody>${pool.slice(0,50).map(p => {
            const injStatus = p.injury ? p.injury.status : 'healthy';
            return `<tr>
              <td><div style="display:flex;align-items:center;gap:10px">${av(p.name, gradFor(p.id), 'sm')}<div><div style="font-weight:500">${esc(p.name)}</div><div style="font-size:11px;color:var(--ink-3);font-family:var(--mono)">${esc(p.team)}</div></div></div></td>

        </table>
      </div>`;

  // ---------- SCHEDULE ----------
  views.schedule = async () => {
    const [me, schedData] = await Promise.all([
      loaders.me(),
      tryGet(loaders.schedule, {schedule:[]}),
    ]);
    const all = Array.isArray(schedData.schedule) ? schedData.schedule : [];
    const mine = all.filter(m => m.team_a === me.team_id || m.team_b === me.team_id);
    mine.sort((a,b) => a.week - b.week);
    const cw = me.current_week || 0;

    if (!mine.length) {
      return `<div class="view-head"><div class="view-title-block"><span class="eyebrow">整季排程</span><div class="view-title">排程</div></div></div>${emptyCard('尚無排程（賽季未開始）')}`;
    }

    const won = mine.filter(m => m.complete && ((m.team_a===me.team_id && m.score_a>m.score_b) || (m.team_b===me.team_id && m.score_b>m.score_a))).length;
    const lost = mine.filter(m => m.complete).length - won;
    const future = mine.filter(m => !m.complete && m.week > cw).length;

    return `
      <div class="view-head">
        <div class="view-title-block">
          <span class="eyebrow">整季排程</span>
          <div class="view-title">你的 ${mine.length} 週賽程</div>
          <div class="view-sub">${won} 勝 ${lost} 敗 · ${future} 場待打</div>
        </div>
      </div>
      <div class="week-grid">${mine.map(m => {
        const isA = m.team_a === me.team_id;
        const myScore = isA ? m.score_a : m.score_b;
        const oppScore = isA ? m.score_b : m.score_a;
        const oppId = isA ? m.team_b : m.team_a;
        let cls = 'future';
        let scoreStr = '—';
        if (m.complete) {
          cls = myScore > oppScore ? 'won' : 'lost';
          scoreStr = `${myScore.toFixed(0)}-${oppScore.toFixed(0)}`;
        } else if (m.week === cw) {
          cls = 'current';
          scoreStr = `${myScore.toFixed(0)}-${oppScore.toFixed(0)}`;
        }
        return `<div class="week-cell ${cls}" data-week="${m.week}">
          <div class="wn">W${m.week}</div>
          <div class="wscore">${scoreStr}</div>
          <div style="font-size:10px;color:var(--ink-3);font-family:var(--mono);margin-top:4px">vs T${oppId}</div>
        </div>`;
      }).join('')}</div>

      <div style="margin-top:var(--s-7)" class="card card-pad">
        <div style="display:flex;gap:var(--s-5);flex-wrap:wrap;align-items:center;font-size:var(--fs-xs);color:var(--ink-3)">
          <span style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:3px;box-shadow:inset 0 0 0 1px rgba(74,222,128,0.3)"></span>勝</span>
          <span style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:3px;box-shadow:inset 0 0 0 1px rgba(248,113,113,0.2)"></span>敗</span>
          <span style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:3px;background:var(--accent-14);box-shadow:inset 0 0 0 1px var(--accent)"></span>本週</span>
          <span style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:3px;border:1px dashed var(--pg)"></span>未來</span>
        </div>
      </div>`;
  };

  // ---------- NEWS ----------
  views.news = async () => {
    const data = await tryGet(loaders.news, {feed:[]});
    const feed = Array.isArray(data.feed) ? data.feed : (Array.isArray(data) ? data : []);
    const kindLabel = {injury:'傷兵',heat:'熱議',league:'聯盟',quote:'引言',milestone:'里程碑',matchup:'對戰'};
    const kindIcon  = {injury:'🩹',heat:'🔥',league:'📎',quote:'"',milestone:'★',matchup:'⚔'};
    return `
      <div class="view-head">
        <div class="view-title-block">
          <span class="eyebrow">聯盟動態</span>
          <div class="view-title">News Feed</div>
          <div class="view-sub">${feed.length} 則消息</div>
        </div>
        <div class="view-actions">
          <div class="segmented"><button aria-pressed="true">全部</button><button>傷兵</button><button>熱議</button><button>引言</button></div>
        </div>
      </div>
      <div class="card">
        ${feed.length === 0 ? `<div class="empty-state">尚無動態</div>` : feed.map((n,i) => {
          const k = n.kind || 'league';
          return `<div style="display:grid;grid-template-columns:32px 80px 1fr;gap:var(--s-4);padding:var(--s-4) var(--s-5);${i<feed.length-1?'border-bottom:1px solid var(--line-soft)':''}">
            <div class="news-dot" data-kind="${esc(k)}">${kindIcon[k]||'·'}</div>
            <div style="font-size:11px;color:var(--ink-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;padding-top:6px">${esc(kindLabel[k]||k)}</div>
            <div>
              ${k === 'quote' && n.quote
                ? `<div class="news-quote" style="font-size:var(--fs-md)">${esc(n.quote)}</div><div class="news-attrib">— ${esc(n.attrib || '')}</div>`
                : `<div style="font-size:var(--fs-md);font-weight:500">${esc(n.title || '')}</div>`}
              <div class="news-meta" style="margin-top:6px">${esc(n.meta || '')}</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  };

  // ========================================================
  // ROUTER
  // ========================================================
  function currentRoute() {
    const hh = (location.hash || '#/home').replace(/^#\/?/, '');
    return hh || 'home';
  }

  async function mount() {
    const r = currentRoute();
    const view = views[r] || views.home;
    const main = $('#main');
    main.innerHTML = skeleton(r);
    try {
      const html = await view();
      main.innerHTML = html;
    } catch (e) {
      console.error('view error', e);
      main.innerHTML = errorCard(e);
    }
    main.scrollTop = 0;
    window.scrollTo(0, 0);
    try { await renderNav(); } catch(e){ console.error('nav', e); }
    try { await renderRail(); } catch(e){ console.error('rail', e); }
    bindViewEvents();
  }

  function bindViewEvents() {
    // Error-retry button
    const retry = $('#err-retry');
    if (retry) retry.addEventListener('click', () => { invalidate('/api/'); mount(); });

    // Trade thread clicks
    $$('.ts-row[data-thread]').forEach(row => {
      row.addEventListener('click', () => {
        activeThread = row.dataset.thread;
        mount();
      });
    });

    // Action item: navigate to relevant route by id prefix
    $$('.action-item').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.action || '';
        if (id.startsWith('trade-'))   { activeThread = id.slice('trade-'.length); location.hash = '#/trade'; }
        else if (id.startsWith('inj-')) location.hash = '#/roster';
        else if (id.startsWith('fa-'))  location.hash = '#/fa';
        else if (id === 'lineup-unset') location.hash = '#/roster';
      });
    });

    // Draft pick
    $$('button[data-reco-id]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const pid = btn.dataset.recoId;
        const pname = btn.dataset.recoName;
        try {
          const r = await fetch('/api/draft/pick', {
            method:'POST',
            headers:{'content-type':'application/json'},
            body: JSON.stringify({player_id: Number(pid)}),
          });
          if (!r.ok) throw new Error((await r.text()).slice(0,200));
          toast(`已選擇 ${pname}`, 'success');
          invalidate('/api/');
          mount();
        } catch(e) {
          toast('選秀失敗：' + e.message, 'error');
        }
      });
    });

    // Trade accept/reject
    $$('button[data-trade-accept]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.tradeAccept;
        try {
          const r = await fetch(`/api/trades/${encodeURIComponent(id)}/accept`, {method:'POST'});
          if (!r.ok) throw new Error((await r.text()).slice(0,200));
          toast('已接受交易', 'success');
          invalidate('/api/trades'); invalidate('/api/teams'); invalidate('/api/me');
          mount();
        } catch(e) { toast('接受失敗：' + e.message, 'error'); }
      });
    });
    $$('button[data-trade-reject]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.tradeReject;
        try {
          const r = await fetch(`/api/trades/${encodeURIComponent(id)}/reject`, {method:'POST'});
          if (!r.ok) throw new Error((await r.text()).slice(0,200));
          toast('已拒絕交易', 'success');
          invalidate('/api/trades'); mount();
        } catch(e) { toast('拒絕失敗：' + e.message, 'error'); }
      });
    });

    // FA claim (simple: auto-drop last bench player; real app would prompt)
    $$('button[data-fa-claim]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const addId = Number(btn.dataset.faClaim);
        try {
          const me = await loaders.me();
          const team = await loaders.team(me.team_id);
          const bench = team.bench || [];
          if (!bench.length) { toast('板凳無球員可放走', 'error'); return; }
          const dropId = bench[bench.length - 1];
          const r = await fetch('/api/fa/claim', {
            method:'POST',
            headers:{'content-type':'application/json'},
            body: JSON.stringify({add_player_id: addId, drop_player_id: dropId, bid: 1}),
          });
          if (!r.ok) throw new Error((await r.text()).slice(0,200));
          toast('認領成功', 'success');
          invalidate('/api/'); mount();
        } catch(e) { toast('認領失敗：' + e.message, 'error'); }
      });
    });

    // Schedule week click -> navigate to matchup (current week only supported today)
    $$('.week-cell[data-week]').forEach(el => {
      el.addEventListener('click', () => { location.hash = '#/matchup'; });
    });

    // Trade chat send
    const sendBtn = $('#chat-send');
    if (sendBtn) {
      const doSend = async () => {
        const input = $('#chat-input');
        const tradeId = input && input.dataset ? input.dataset.tradeId : null;
        const text = (input && input.value || '').trim();
        if (!text || !tradeId) return;
        try {
          const r = await fetch(`/api/trades/${encodeURIComponent(tradeId)}/message`, {
            method:'POST',
            headers:{'content-type':'application/json'},
            body: JSON.stringify({body: text}),
          });
          if (!r.ok) throw new Error((await r.text()).slice(0,200));
          input.value = '';
          invalidate('/api/trades');
          mount();
        } catch(e) { toast('訊息送出失敗：' + e.message, 'error'); }
      };
      sendBtn.addEventListener('click', doSend);
      $('#chat-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') doSend(); });
    }
  }

  // ========================================================
  // CMD-K palette
  // ========================================================
  const cmdItems = [
    { group:'跳頁' },
    { icon:I.home,     label:'今日總覽', hash:'#/home' },
    { icon:I.match,    label:'本週對戰', hash:'#/matchup' },
    { icon:I.roster,   label:'我的陣容', hash:'#/roster' },
    { icon:I.trade,    label:'交易中心', hash:'#/trade' },
    { icon:I.fa,       label:'自由球員', hash:'#/fa' },
    { icon:I.draft,    label:'選秀廳',   hash:'#/draft' },
    { icon:I.league,   label:'聯盟排名', hash:'#/standings' },
    { icon:I.schedule, label:'整季排程', hash:'#/schedule' },
    { icon:I.chat,     label:'聯盟動態', hash:'#/news' },
    { group:'動作' },
    { icon:I.sparkle,  label:'重新整理資料', action:() => { invalidate('/api/'); mount(); toast('已重新整理'); } },
  ];

  function openCmd() {
    const bd = $('#cmdk-bd'); bd.classList.add('open');
    $('#cmdk-q').value = ''; $('#cmdk-q').focus();
    renderCmdList('');
  }
  function closeCmd() { $('#cmdk-bd').classList.remove('open'); }
  function renderCmdList(q) {
    const filter = (q || '').toLowerCase();
    const list = $('#cmdk-list');
    let html = ''; let idx = 0;
    cmdItems.forEach(it => {
      if (it.group) { html += `<div class="cmdk-group">${esc(it.group)}</div>`; return; }
      if (filter && !it.label.toLowerCase().includes(filter)) return;
      html += `<div class="cmdk-item" data-idx="${idx}" ${idx===0?'aria-selected=true':''}>
        ${it.icon}<span>${esc(it.label)}</span>${it.hash?`<span class="kbd">↵</span>`:''}
      </div>`;
      idx++;
    });
    list.innerHTML = html || '<div style="padding:24px;text-align:center;color:var(--ink-3);font-size:var(--fs-sm)">沒有符合的項目</div>';

    const matches = cmdItems.filter(it => !it.group && (!filter || it.label.toLowerCase().includes(filter)));
    $$('.cmdk-item', list).forEach((el, i) => {
      el.addEventListener('click', () => {
        const it = matches[i];
        if (it.hash) location.hash = it.hash;
        if (it.action) it.action();
        closeCmd();
      });
    });
  }

  $('#cmd-open').addEventListener('click', openCmd);
  $('#cmdk-bd').addEventListener('click', e => { if (e.target.id === 'cmdk-bd') closeCmd(); });
  $('#cmdk-q').addEventListener('input', e => renderCmdList(e.target.value));
  $('#cmdk-q').addEventListener('keydown', e => {
    if (e.key === 'Escape') closeCmd();
    if (e.key === 'Enter') {
      const first = $('.cmdk-item', $('#cmdk-list'));
      if (first) first.click();
    }
  });
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openCmd(); }
    if (e.key === 'Escape') closeCmd();
  });

  // ========================================================
  // TOASTS
  // ========================================================
  function toast(text, kind='success') {
    const el = h('div', {class:'toast' + (kind==='error'?' error':'')});
    el.innerHTML = `<span class="t-ic">${I.check}</span><div>${esc(text)}</div>`;
    $('#toasts').append(el);
    setTimeout(() => { el.style.transition = 'opacity 200ms'; el.style.opacity = '0'; setTimeout(() => el.remove(), 200); }, 2800);
  }

  // ========================================================
  // BOOT
  // ========================================================
  window.addEventListener('hashchange', mount);
  if (!location.hash) location.hash = '#/home';
  mount();
})();

</script>

</body>
</html>
