<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fantasy NBA v2</title>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="shell.css"/>
</head>
<body>
<div class="app" id="app">
    <header class="shell-header">
        <div class="brand">
            <div class="brand-mark">NF</div>
            <div class="brand-name">Fantasy NBA <span class="sub">/ v2</span></div>
        </div>
        <div class="league-switch" id="header-league-name">
            <span class="phase-dot"></span>
            <span id="league-name-text">NBA Fantasy</span>
        </div>
        <div class="league-switcher-v2" id="league-switcher-v2">
            <button class="lsw-btn-v2" id="btn-league-switch" aria-haspopup="menu" aria-expanded="false" type="button" title="切換/建立聯盟">
                <span class="lsw-label-v2">聯盟</span>
                <span class="lsw-current-v2" id="lsw-current">—</span>
                <span aria-hidden="true" style="margin-left:4px;">▾</span>
            </button>
            <div class="lsw-menu-v2" id="league-switch-menu" role="menu" hidden></div>
        </div>
        <div class="header-actions" style="margin-left:auto;">
            <span id="conn-dot" class="pill" style="font-size:10px;">—</span>
            <button class="icon-btn" id="btn-share-league" title="分享聯盟（manager 連結）">🔗</button>
            <button class="icon-btn" id="btn-reset-draft" title="重置選秀">↻</button>
            <div class="me-chip">
                <div class="av sm" data-grad="1">ME</div>
                <span class="me-chip-name">經理</span>
            </div>
        </div>
    </header>
    <dialog id="dlg-new-league-v2" class="dlg-v2" aria-labelledby="dlg-new-league-title-v2">
        <form method="dialog" class="dlg-v2-inner">
            <h2 id="dlg-new-league-title-v2">建立新聯盟</h2>
            <label class="dlg-field-v2">
                <span>聯盟 ID（英數字 / - / _，最多 32 字）</span>
                <input type="text" id="new-league-id-v2" maxlength="32" placeholder="例如 season2" autocomplete="off">
            </label>
            <p class="dlg-hint-v2">建立後會自動切換，並進入設定畫面。</p>
            <div class="dlg-foot-v2">
                <button type="submit" value="cancel" class="btn ghost">取消</button>
                <button type="button" class="btn" id="btn-new-league-create-v2">建立並切換</button>
            </div>
        </form>
    </dialog>
    <dialog id="dlg-confirm-v2" class="dlg-v2" aria-labelledby="dlg-confirm-title-v2">
        <form method="dialog" class="dlg-v2-inner">
            <h2 id="dlg-confirm-title-v2">確認</h2>
            <p id="dlg-confirm-body-v2" class="dlg-hint-v2"></p>
            <div class="dlg-foot-v2">
                <button type="submit" value="cancel" class="btn ghost">取消</button>
                <button type="submit" value="ok" class="btn" id="dlg-confirm-ok-v2">確定</button>
            </div>
        </form>
    </dialog>
    <nav class="shell-nav" id="nav">
        <a class="nav-item" href="#/teams"    data-route="teams">    <span class="ni-ic">👥</span> 隊伍</a>
        <a class="nav-item" href="#/fa"       data-route="fa">       <span class="ni-ic">🔁</span> 自由球員</a>
        <a class="nav-item" href="#/league"   data-route="league">   <span class="ni-ic">🏆</span> 聯盟</a>
        <a class="nav-item" href="#/schedule" data-route="schedule"> <span class="ni-ic">📅</span> 賽程</a>
        <a class="nav-item" href="#/trades"   data-route="trades">   <span class="ni-ic">🤝</span> 交易</a>
        <a class="nav-item" href="#/draft"    data-route="draft">    <span class="ni-ic">🎯</span> 選秀</a>
    </nav>
    <main class="shell-main" id="main" tabindex="-1"></main>
    <aside class="shell-rail" id="rail">
        <div class="rail-section">
            <div class="rail-head">聯盟動態</div>
            <div class="news-feed" id="rail-feed">
                <div style="color:var(--ink-3); font-size: var(--fs-xs); padding: 12px;">尚無動態</div>
            </div>
        </div>
    </aside>
</div>
<div class="toast-stack" id="toast-stack"></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
