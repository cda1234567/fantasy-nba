<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fantasy NBA v2</title>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="shell.css"/>
</head>
<body>
<div class="app" id="app">
    <header class="shell-header">
        <div class="brand">
            <div class="brand-mark">NF</div>
            <div class="brand-name">Fantasy NBA <span class="sub">/ v2</span></div>
        </div>
        <div class="league-switch" id="header-league-name">
            <span class="phase-dot"></span>
            <span id="league-name-text">NBA Fantasy</span>
        </div>
        <div class="header-actions" style="margin-left:auto;">
            <span id="conn-dot" class="pill" style="font-size:10px;">—</span>
            <button class="icon-btn" id="btn-reset-draft" title="重置選秀">↻</button>
            <div class="me-chip">
                <div class="av sm" data-grad="1">ME</div>
                <span class="me-chip-name">經理</span>
            </div>
        </div>
    </header>
    <nav class="shell-nav" id="nav">
        <a class="nav-item" href="#/draft"    data-route="draft">    <span class="ni-ic">🎯</span> 選秀</a>
        <a class="nav-item" href="#/teams"    data-route="teams">    <span class="ni-ic">👥</span> 隊伍</a>
        <a class="nav-item" href="#/fa"       data-route="fa">       <span class="ni-ic">🔁</span> 自由球員</a>
        <a class="nav-item" href="#/league"   data-route="league">   <span class="ni-ic">🏆</span> 聯盟</a>
        <a class="nav-item" href="#/schedule" data-route="schedule"> <span class="ni-ic">📅</span> 賽程</a>
        <a class="nav-item" href="#/trades"   data-route="trades">   <span class="ni-ic">🤝</span> 交易</a>
    </nav>
    <main class="shell-main" id="main" tabindex="-1"></main>
    <aside class="shell-rail" id="rail">
        <div class="rail-section">
            <div class="rail-head">聯盟動態</div>
            <div class="news-feed" id="rail-feed">
                <div style="color:var(--ink-3); font-size: var(--fs-xs); padding: 12px;">尚無動態</div>
            </div>
        </div>
    </aside>
</div>
<div class="toast-stack" id="toast-stack"></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
